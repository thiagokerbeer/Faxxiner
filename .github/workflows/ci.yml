name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Aspas obrigatórias: URLs com ":" quebram YAML se estiverem sem aspas (DATABASE_URL vira vazio).
env:
  DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: .env para Prisma (CI)
        run: printf '%s\n' 'DATABASE_URL=postgresql://ci:ci@127.0.0.1:5432/ci?schema=public' > .env
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Prisma resolve env("DATABASE_URL") no validate mesmo sem DB real — URL fictícia basta.
      - name: Prisma validate
        working-directory: backend
        shell: bash
        env:
          DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"
        run: |
          export DATABASE_URL="${DATABASE_URL:-postgresql://ci:ci@127.0.0.1:5432/ci?schema=public}"
          npx prisma validate
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"
      - name: Test
        run: npm test
        env:
          DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
